services:
  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeyeweb
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "0"
    command: gunicorn -c gunicorn.conf.py run:app
    volumes:
      - ./nnUNet:/app/nnUNet
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/upload:/app/static/upload
      - /mnt/filer01/MatTechLab/jaime.barranco/A-eye/A-eye_web/data:/app/filer01
      - ${A_EYE_SSH_DIR:-/home/debi/.ssh}:/root/.ssh:ro
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_aeyeweb
    restart: unless-stopped
    depends_on:
      - flask_app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
