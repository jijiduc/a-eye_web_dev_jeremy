services:
  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeyeweb
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "0"
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL_PROD:-https://aeye.hevs.ch/callback}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL_PROD:-https://aeye.hevs.ch/}
    command:
      - sh
      - -c
      - |
        rm -rf /root/.ssh
        mkdir -p /root/.ssh
        cp -r /ssh-src/. /root/.ssh/
        chmod 700 /root/.ssh
        chmod 600 /root/.ssh/*
        chmod 644 /root/.ssh/*.pub 2>/dev/null || true
        exec gunicorn -c gunicorn.conf.py run:app
    volumes:
      - ./nnUNet:/app/nnUNet
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/upload:/app/static/upload
      - /mnt/filer01/MatTechLab/jaime.barranco/A-eye/A-eye_web/data:/app/filer01
      - ${A_EYE_SSH_DIR_PROD:-/home/jaime.barranco@hevs.ch/.ssh}:/ssh-src:ro
    networks:
      - backend

  traefik:
    image: traefik:v3.7.4
    container_name: traefik_aeyeweb
    restart: unless-stopped
    depends_on:
      - flask_app
    ports:
      - "443:443"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /letsencrypt:/letsencrypt
    networks:
      - backend

networks:
  backend:
    driver: bridge
