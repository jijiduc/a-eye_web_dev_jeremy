services:
  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeyeweb
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "0"
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL_PROD:-https://vlenpaeye.hevs.ch/callback}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL_PROD:-https://vlenpaeye.hevs.ch/}
    command: gunicorn -c gunicorn.conf.py run:app
    volumes:
      - ./nnUNet:/app/nnUNet
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/upload:/app/static/upload
      - /mnt/filer01/MatTechLab/jaime.barranco/A-eye/A-eye_web/data:/app/filer01
      - ${A_EYE_SSH_DIR_PROD:-/home/jaime.barranco@hevs.ch/}:/root/.ssh:ro
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_aeyeweb
    restart: unless-stopped
    depends_on:
      - flask_app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - backend

  certbot:
    image: certbot/certbot:latest
    container_name: certbot_aeyeweb
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - backend

networks:
  backend:
    driver: bridge
