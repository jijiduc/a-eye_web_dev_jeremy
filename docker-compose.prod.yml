services:
  flask_app:
    environment:
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL_PROD:-https://aeye.hevs.ch/callback}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL_PROD:-https://aeye.hevs.ch/}
    volumes:
      - ${A_EYE_SSH_DIR_PROD:-/home/jaime.barranco@hevs.ch/.ssh}:/root/.ssh:ro

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: certbot_aeyeweb
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - backend
