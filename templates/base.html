<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Make it compatible to mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEye</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"></script>
</head>

<body>
  <div style="margin-top: 50px;" class="ui container">
    <h1 class="ui center aligned header">AEye automated segmentation</h1>
    <hrc:\Users\TORRE\AppData\Local\Programs\Microsoft VS Code\resources\app\out\vs\code\electron-sandbox\workbench\workbench.html>
    <!-- Choose files button -->

    <!-- Segment button -->
    <a class="ui blue button" href="/segment">Segment</a>
    <!-- Segment label -->
    {% if done == True %}
    <span class="ui green label">Done</span>
    {% else %}
    <span class="ui gray label">Ready to segment</span>
    {% endif %}

  </div>
  
  <!-- The enctype attribute specifies that the form data will be encoded using multipart/form-data, which is the standard encoding used for file uploads. -->
  <form method="POST" action="/" enctype="multipart/form-data">
    <dl>
      <p style="color:Violet;">
        <!-- The multiple attribute is set to allow the user to select multiple files to upload. -->
        <input type="file" name="file" multiple>
      </p>
    </dl>
    <p style="color:Violet;">
      <input type="submit" name="upload_files" value="Upload">
    </p>
  </form>

  <p style="color:MediumSeaGreen;">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
          Diagnosis for the following image is: <u><h3 style="color:MediumSeaGreen;">{{ messages[0] }}</h3></u><br>
          <!-- <img src="{{ messages[1] }}" width="300", height="225"> -->
      {% endif %}
    {% endwith %}
  </p>

</body>

</html>
