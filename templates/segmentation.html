{% extends "base.html" %}

{% block title %}Segmentation - AEye{% endblock %}

{% block content %}
<div class="container" style="margin-top: 50px;">
    <h2 class="main-title text-center">Segmentation Tool</h2>

    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-3">
            <form id="choose-file-form">
                <input type="file" id="file-input" style="display: none;" multiple onchange="displaySelectedFiles()">
                <button type="button" class="btn btn-success btn-lg btn-block" id="choose-file-button" onclick="document.getElementById('file-input').click();">
                    <i class="fas fa-mouse-pointer"></i> Choose File(s)
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="upload-form" method="post" enctype="multipart/form-data">
                <button type="button" class="btn btn-secondary btn-lg btn-block" id="upload-button" onclick="uploadFiles()" disabled>
                    <i class="fas fa-upload"></i> Upload
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="segment-form" method="post">
                <button type="button" class="btn btn-secondary btn-lg btn-block" id="segment-button" onclick="segmentFiles()" disabled>
                    <i class="fas fa-cogs"></i> Segment
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="download-form" method="get" action="/download">
                <button type="button" id="download-button" class="btn btn-secondary btn-lg btn-block" disabled>
                    <i class="fas fa-download"></i> Download
                </button>
            </form>
        </div>
    </div>

    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-12">
            <div id="processing-spinner" class="text-center mt-3" style="display: none;">
                <div class="spinner-border" role="status" style="border-color: green; border-right-color: transparent;">
                </div>
                <div class="mt-2">Processing segmentation…</div>
            </div>
        </div>
    </div>
    <!-- Consent notice -->
    <p class="text-muted text-center mt-4" style="max-width: 800px; margin: 0 auto;">
        By proceeding, I authorize the A-eye team to store my image data in a secure, non-public database to help improve A-eye's performance.
    </p>

    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-12">
            <ul id="file-list" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
    function displaySelectedFiles() {
        var fileList = document.getElementById('file-list');
        var files = document.getElementById('file-input').files;
        fileList.innerHTML = ''; // Clear the list

        var acceptedFiles = [];
        var rejectedFiles = [];
        var allowedExtensions = ['gz', 'zip', '7z']; // Adjust based on backend rules

        for (var i = 0; i < files.length; i++) {
            var listItem = document.createElement('li');
            listItem.className = 'list-group-item d-flex justify-content-between align-items-center';
            listItem.textContent = files[i].name;

            var fileExtension = files[i].name.split('.').pop().toLowerCase();
            if (allowedExtensions.includes(fileExtension)) {
                listItem.style.color = 'green'; // ✅ Accepted (green)
                listItem.innerHTML += ' <span class="badge bg-success">Accepted ✅</span>';
                acceptedFiles.push(files[i].name);
            } else {
                listItem.style.color = 'red'; // ❌ Rejected (red)
                listItem.innerHTML += ' <span class="badge bg-danger">Rejected ❌</span>';
                rejectedFiles.push(files[i].name);
            }

            fileList.appendChild(listItem);
        }

        // Display summary
        var summaryMessage = document.createElement('p');
        summaryMessage.className = 'mt-2 fw-bold';
        if (acceptedFiles.length > 0 && rejectedFiles.length > 0) {
            summaryMessage.innerHTML = `✅ <span class="text-success">${acceptedFiles.length} accepted</span> | ❌ <span class="text-danger">${rejectedFiles.length} rejected</span>`;
        } else if (acceptedFiles.length > 0) {
            summaryMessage.innerHTML = `✅ <span class="text-success">${acceptedFiles.length} accepted</span>`;
        } else if (rejectedFiles.length > 0) {
            summaryMessage.innerHTML = `❌ <span class="text-danger">${rejectedFiles.length} rejected</span>`;
        }

        fileList.appendChild(summaryMessage);

        // Enable upload button only if there are accepted files
        var uploadButton = document.getElementById('upload-button');
        if (acceptedFiles.length > 0) {
            uploadButton.classList.remove('btn-secondary');
            uploadButton.classList.add('btn-success');
            uploadButton.disabled = false;
        } else {
            uploadButton.classList.remove('btn-success');
            uploadButton.classList.add('btn-secondary');
            uploadButton.disabled = true;
        }
    }

    function uploadFiles() {
        var formData = new FormData();
        var files = document.getElementById('file-input').files;

        for (var i = 0; i < files.length; i++) {
            formData.append('files[]', files[i]);
        }

        fetch('/upload', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if (data.status === 'success') {
                var segmentButton = document.getElementById('segment-button');
                segmentButton.classList.remove('btn-secondary');
                segmentButton.classList.add('btn-success');
                segmentButton.disabled = false;
            }
        })
        .catch(error => {
            alert('An error occurred while uploading files.');
            console.error('Error:', error);
        });
    }

    function segmentFiles() {
        const spinner = document.getElementById('processing-spinner');
        const downloadButton = document.getElementById('download-button');
        const segmentButton = document.getElementById('segment-button');
        const uploadButton = document.getElementById('upload-button');

        // Disable buttons
        segmentButton.disabled = true;
        uploadButton.disabled = true;
        segmentButton.classList.add('btn-secondary');
        segmentButton.classList.remove('btn-success');
        uploadButton.classList.add('btn-secondary');
        uploadButton.classList.remove('btn-success');

        // Show spinner
        spinner.style.display = 'block';

        fetch('/segment', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                spinner.style.display = 'none';

                downloadButton.disabled = false;
                downloadButton.classList.remove('btn-secondary');
                downloadButton.classList.add('btn-success');
                downloadButton.setAttribute('data-download-url', data.download_url);

                alert('Segmentation completed successfully.');
                window.location.href = data.download_url;
            })
            .catch(error => {
                spinner.style.display = 'none';
                console.error('Segmentation error:', error);
                alert('Failed to complete segmentation.');
            });
    }

    document.getElementById('download-button').addEventListener('click', function () {
        var downloadUrl = this.getAttribute('data-download-url');
        if (downloadUrl) {
            window.location.href = downloadUrl;
        } else {
            alert('No file available for download. Please run segmentation first.');
        }
    });
</script>
{% endblock %}
