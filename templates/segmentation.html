{% extends "base.html" %}

{% block title %}Segmentation{% endblock %}

{% block content %}
<div class="container" style="margin-top: 50px;">
    <h2 class="text-center">Segmentation Tool</h2>
    <p class="text-center">Please follow the steps below to segment your NIfTI files:</p>
    <ol class="text-center">
        <li>Select your NIfTI files</li>
        <li>Upload the files</li>
        <li>Start the segmentation process</li>
    </ol>
    <div class="text-center">
        <form id="segmentation-form" method="POST" action="{{ url_for('upload_files') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="file">Choose File(s)</label>
                <input type="file" class="form-control-file" id="file" name="file" multiple required>
            </div>
            <button type="submit" class="btn btn-custom" id="upload-btn">Upload</button>
        </form>
        <button class="btn btn-custom" id="segment-btn" onclick="startSegmentation()">Segment</button>
    </div>
</div>
{% endblock %}

<script>
function startSegmentation() {
    // Add your segmentation logic here
    alert("Segmentation started!");
}
</script>
