{% extends "base.html" %}

{% block title %}Segmentation - AEye{% endblock %}

{% block content %}
<div class="container" style="margin-top: 50px;">
    <h2 class="main-title text-center">Segmentation Tool</h2>
    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-3">
            <form id="choose-file-form">
                <input type="file" id="file-input" style="display: none;" multiple onchange="displaySelectedFiles()">
                <button type="button" class="btn btn-success btn-lg btn-block" id="choose-file-button" onclick="document.getElementById('file-input').click();">
                    <i class="fas fa-mouse-pointer"></i> Choose File(s)
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="upload-form" method="post" enctype="multipart/form-data">
                <button type="button" class="btn btn-secondary btn-lg btn-block" id="upload-button" onclick="uploadFiles()" disabled>
                    <i class="fas fa-upload"></i> Upload
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="segment-form" method="post">
                <button type="button" class="btn btn-secondary btn-lg btn-block" id="segment-button" onclick="segmentFiles()" disabled>
                    <i class="fas fa-cogs"></i> Segment
                </button>
            </form>
        </div>
        <div class="col-md-3">
            <form id="download-form" method="get" action="/download">
                <button type="button" id="download-button" class="btn btn-secondary btn-lg btn-block" disabled>
                    <i class="fas fa-download"></i> Download
                </button>
            </form>
        </div>
    </div>
    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-12">
            <div class="progress" style="height: 30px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
            </div>
        </div>
    </div>
    <div class="row text-center" style="margin-top: 30px;">
        <div class="col-md-12">
            <ul id="file-list" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
    function displaySelectedFiles() {
        var fileList = document.getElementById('file-list');
        var files = document.getElementById('file-input').files;
        fileList.innerHTML = ''; // Clear the list

        for (var i = 0; i < files.length; i++) {
            var listItem = document.createElement('li');
            listItem.className = 'list-group-item';
            listItem.textContent = files[i].name;
            fileList.appendChild(listItem);
        }

        // Enable and change the color of the upload button
        var uploadButton = document.getElementById('upload-button');
        uploadButton.classList.remove('btn-secondary');
        uploadButton.classList.add('btn-success');
        uploadButton.disabled = false;
    }

    function uploadFiles() {
        var formData = new FormData();
        var files = document.getElementById('file-input').files;

        for (var i = 0; i < files.length; i++) {
            formData.append('files[]', files[i]);
        }

        fetch('/upload', {
            method: 'POST',
            body: formData
        }).then(response => {
            if (response.ok) {
                alert('Files uploaded successfully.');
                // Enable and change the color of the segment button
                var segmentButton = document.getElementById('segment-button');
                segmentButton.classList.remove('btn-secondary');
                segmentButton.classList.add('btn-success');
                segmentButton.disabled = false;
            } else {
                alert('Failed to upload files.');
            }
        });
    }

    function segmentFiles() {
        var progressBar = document.getElementById('progress-bar');
        var downloadButton = document.getElementById('download-button');
        var progress = 0;

        // Simulate progress for demonstration purposes
        var interval = setInterval(function() {
            if (progress >= 100) {
                clearInterval(interval);
                progressBar.style.width = '100%';
                progressBar.setAttribute('aria-valuenow', 100);
                progressBar.innerHTML = '100%';
                downloadButton.classList.remove('btn-secondary');
                downloadButton.classList.add('btn-success');
                downloadButton.disabled = false;
                alert('Segmentation completed successfully.');
            } else {
                progress += 10;
                progressBar.style.width = progress + '%';
                progressBar.setAttribute('aria-valuenow', progress);
                progressBar.innerHTML = progress + '%';
            }
        }, 1000);

        fetch('/segment', {
            method: 'POST'
        }).then(response => {
            if (response.ok) {
                clearInterval(interval);
                progressBar.style.width = '100%';
                progressBar.setAttribute('aria-valuenow', 100);
                progressBar.innerHTML = '100%';
                downloadButton.classList.remove('btn-secondary');
                downloadButton.classList.add('btn-success');
                downloadButton.disabled = false;
                alert('Segmentation completed successfully.');
            } else {
                alert('Failed to complete segmentation.');
            }
        });
    }
</script>
{% endblock %}
